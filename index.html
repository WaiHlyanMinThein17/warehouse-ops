<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPD Warehouse Ops</title>

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-left">
      <div class="logo">
        <div class="logo-mark">G</div>
        GPD Warehouse Ops
      </div>
      <nav class="nav-tabs" id="nav-tabs">
        <button class="nav-tab active" data-module="replenishment">
          <span class="nav-dot" style="background:var(--warn)"></span>
          Replenishment
        </button>
        <button class="nav-tab" data-module="emptybins">
          <span class="nav-dot" style="background:var(--empty)"></span>
          Empty Bins
        </button>
        <button class="nav-tab" data-module="processinglog">
          <span class="nav-dot" style="background:var(--accent)"></span>
          Processing Log
        </button>
      </nav>
    </div>
    <div class="header-right">
      <span id="last-updated" class="last-updated" style="display:none"></span>
      <span class="badge">MACON · OAC</span>
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main class="main" id="app-root">
    <div id="module-replenishment" class="module active"></div>
    <div id="module-emptybins" class="module"></div>
    <div id="module-processinglog" class="module"></div>
  </main>

  <!-- ── Core scripts ── -->
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/app.js"></script>

  <!-- ── Feature modules ── -->
  <script src="assets/js/modules/replenishment.js"></script>
  <script src="assets/js/modules/emptybins.js"></script>
  <script src="assets/js/modules/processinglog.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();

      // Theme toggle
      const toggle = document.getElementById('theme-toggle');
      const html   = document.documentElement;

      // Restore saved preference
      const saved = localStorage.getItem('gpd-theme') || 'light';
      html.setAttribute('data-theme', saved);
      toggle.textContent = saved === 'dark' ? '☀️' : '🌙';

      toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const next    = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        toggle.textContent = next === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('gpd-theme', next);
      });
    });
  </script>
</body>
</html>
